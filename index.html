        body {

            line-height: 1.6;
        }

        /* Cabeçalho e Navegação */
        header {

            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .logo span {
            color: #81c784; /* Verde Claro */
        }

            font-weight: 500;
            transition: color 0.3s;

            color: #81c784;
        }

        .hero {

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            padding: 0 20px;
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 25px;
        }

            color: #1b5e20;
            padding: 10px 25px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #aeea00;
        }
